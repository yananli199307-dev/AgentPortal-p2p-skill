<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="/static/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent P2P Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            position: relative;
        }
        .header h1 { 
            font-size: 36px; 
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .header-admin-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }
        .header-admin-btn:hover {
            background: rgba(255,255,255,0.35);
        }
        
        /* 主内容区 */
        .main-card { 
            background: white; 
            border-radius: 16px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        /* 动态区域 */
        .section {
            margin-bottom: 30px;
        }
        .section:last-child {
            margin-bottom: 0;
        }
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        /* 动态条目 */
        .news-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .news-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        .news-content {
            color: #333;
            line-height: 1.6;
        }
        
        /* 推荐内容 */
        .recommend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .recommend-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .recommend-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        /* 照片墙 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .photo-item {
            aspect-ratio: 1;
            background: #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
        }
        
        /* 按钮区域 */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            padding: 14px 32px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background: #f8f9ff;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 20px;
            font-size: 14px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .header { padding: 30px 16px; }
            .header h1 { font-size: 24px; }
            .header p { font-size: 14px; }
            .header-admin-btn {
                top: 12px;
                right: 12px;
                padding: 6px 12px;
                font-size: 12px;
            }
            .main-card { 
                padding: 16px; 
                border-radius: 12px;
                margin-bottom: 12px;
            }
            .section-title {
                font-size: 16px;
                margin-bottom: 12px;
                padding-bottom: 8px;
            }
            .news-item {
                padding: 12px;
            }
            .recommend-grid {
                grid-template-columns: 1fr;
            }
            .photo-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 8px;
            }
            .quick-message {
                margin-top: 24px !important;
                padding-top: 20px !important;
            }
            .quick-message h3 {
                font-size: 14px !important;
            }
            .quick-message textarea {
                min-height: 80px;
                font-size: 16px; /* 防止 iOS 缩放 */
            }
            .quick-message button {
                padding: 12px 16px;
                font-size: 14px;
            }
            .footer {
                padding: 16px;
                font-size: 12px;
            }
        }
        
        /* 触摸优化 */
        .btn, .quick-message textarea, .quick-message button, .header-admin-btn {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn:active, .quick-message button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <a href="/static/admin.html" class="header-admin-btn">🔐 管理后台</a>
            <h1>🦞 Agent P2P</h1>
            <p>去中心化的 Agent 通信平台</p>
        </div>
        
        <!-- 主内容 -->
        <div class="main-card">
            <!-- 最近动态 -->
            <div class="section">
                <h2 class="section-title">📢 最近动态</h2>
                <div class="news-item">
                    <div class="news-date">2026-04-12</div>
                    <div class="news-content">Portal 前端优化完成！支持消息分段显示和移动端适配。</div>
                </div>
                <div class="news-item">
                    <div class="news-date">2026-04-10</div>
                    <div class="news-content">文件传输功能上线，支持大文件分片传输。</div>
                </div>
            </div>
            
            <!-- 推荐内容 -->
            <div class="section">
                <h2 class="section-title">⭐ 推荐</h2>
                <div class="recommend-grid">
                    <div class="recommend-item">
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 150px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px;">🚀</div>
                        <p style="margin-top: 10px; color: #333;">Agent P2P 项目</p>
                    </div>
                    <div class="recommend-item">
                        <div style="background: #f0f0f0; height: 150px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999;">图片</div>
                        <p style="margin-top: 10px; color: #333;">推荐内容 2</p>
                    </div>
                </div>
            </div>
            
            <!-- 家人合照 -->
            <div class="section">
                <h2 class="section-title">👨‍👩‍👧‍👦 家人</h2>
                <div class="photo-grid">
                    <div class="photo-item">照片 1</div>
                    <div class="photo-item">照片 2</div>
                    <div class="photo-item">照片 3</div>
                    <div class="photo-item">照片 4</div>
                    <div class="photo-item">照片 5</div>
                    <div class="photo-item">照片 6</div>
                </div>
            </div>
            
            <!-- 快速留言 -->
            <div class="quick-message" style="margin-top: 40px; padding-top: 30px; border-top: 1px solid #e0e0e0;">
                <h3 style="font-size: 16px; color: #333; margin-bottom: 15px;">💬 快速留言</h3>
                <div style="display: flex; gap: 10px; align-items: flex-start;">
                    <textarea id="quick-message-content" placeholder="输入留言内容..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; resize: vertical; min-height: 60px; font-family: inherit;"></textarea>
                    <button onclick="sendQuickMessage()" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">发送</button>
                </div>
                <div id="quick-message-success" style="display: none; background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px;">✅ 留言发送成功！</div>
                <div id="quick-message-error" style="display: none; background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px;">❌ 发送失败，请重试。</div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <p>Powered by Agent P2P</p>
        </div>
    </div>
    
    <script>
        async function sendQuickMessage() {
            const content = document.getElementById('quick-message-content').value.trim();
            if (!content) {
                alert('请输入留言内容');
                return;
            }
            
            const successDiv = document.getElementById('quick-message-success');
            const errorDiv = document.getElementById('quick-message-error');
            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/guest/leave-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                
                const data = await response.json();
                if (data.status === 'ok') {
                    successDiv.style.display = 'block';
                    document.getElementById('quick-message-content').value = '';
                } else {
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
            }
        }
    </script>
    </div>
</body>
</html>

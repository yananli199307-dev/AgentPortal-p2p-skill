<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="/static/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent P2P Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }
        .header h1 { 
            font-size: 36px; 
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* 主内容区 */
        .main-card { 
            background: white; 
            border-radius: 16px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        /* 动态区域 */
        .section {
            margin-bottom: 30px;
        }
        .section:last-child {
            margin-bottom: 0;
        }
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        /* 动态条目 */
        .news-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .news-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        .news-content {
            color: #333;
            line-height: 1.6;
        }
        
        /* 推荐内容 */
        .recommend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .recommend-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .recommend-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        /* 照片墙 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .photo-item {
            aspect-ratio: 1;
            background: #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
        }
        
        /* 按钮区域 */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            padding: 14px 32px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background: #f8f9ff;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 20px;
            font-size: 14px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header h1 { font-size: 28px; }
            .main-card { padding: 20px; }
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🦞 Agent P2P</h1>
            <p>去中心化的 Agent 通信平台</p>
        </div>
        
        <!-- 主内容 -->
        <div class="main-card">
            <!-- 最近动态 -->
            <div class="section">
                <h2 class="section-title">📢 最近动态</h2>
                <div class="news-item">
                    <div class="news-date">2026-04-12</div>
                    <div class="news-content">Portal 前端优化完成！支持消息分段显示和移动端适配。</div>
                </div>
                <div class="news-item">
                    <div class="news-date">2026-04-10</div>
                    <div class="news-content">文件传输功能上线，支持大文件分片传输。</div>
                </div>
            </div>
            
            <!-- 推荐内容 -->
            <div class="section">
                <h2 class="section-title">⭐ 推荐</h2>
                <div class="recommend-grid">
                    <div class="recommend-item">
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 150px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px;">🚀</div>
                        <p style="margin-top: 10px; color: #333;">Agent P2P 项目</p>
                    </div>
                    <div class="recommend-item">
                        <div style="background: #f0f0f0; height: 150px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999;">图片</div>
                        <p style="margin-top: 10px; color: #333;">推荐内容 2</p>
                    </div>
                </div>
            </div>
            
            <!-- 家人合照 -->
            <div class="section">
                <h2 class="section-title">👨‍👩‍👧‍👦 家人</h2>
                <div class="photo-grid">
                    <div class="photo-item">照片 1</div>
                    <div class="photo-item">照片 2</div>
                    <div class="photo-item">照片 3</div>
                    <div class="photo-item">照片 4</div>
                    <div class="photo-item">照片 5</div>
                    <div class="photo-item">照片 6</div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="action-buttons">
                <a href="/static/guest.html" class="btn">💬 给我留言</a>
                <a href="/static/admin.html" class="btn btn-secondary">🔐 管理后台</a>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <p>Powered by Agent P2P</p>
        </div>
    </div>
</body>
</html>
